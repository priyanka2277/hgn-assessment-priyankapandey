spring.application.name=HGN

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/HGN}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eng*187#}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

alert.escalation.threshold-minutes=10